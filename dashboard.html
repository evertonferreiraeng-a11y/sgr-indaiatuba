<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — SGR Indaiatuba</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-root"></div>
  <div class="main-content">
    <div class="page-header">
      <div>
        <h2>Dashboard</h2>
        <p id="periodo-label">Carregando…</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <label style="font-size:12px;color:var(--text-muted)">Mês:</label>
        <input type="month" id="filtro-mes" style="width:150px" />
      </div>
    </div>

    <div class="page-body">
      <!-- KPIs -->
      <div class="kpi-grid" id="kpi-grid">
        <div class="kpi-card"><div class="kpi-label">Produção do Mês</div><div class="kpi-value" id="kpi-producao">—</div><div class="kpi-sub">kg processados</div></div>
        <div class="kpi-card"><div class="kpi-label">Entradas do Mês</div><div class="kpi-value" id="kpi-entradas">—</div><div class="kpi-sub">kg recebidos</div></div>
        <div class="kpi-card"><div class="kpi-label">Faturamento do Mês</div><div class="kpi-value" id="kpi-faturamento">—</div><div class="kpi-sub">em vendas</div></div>
        <div class="kpi-card"><div class="kpi-label">Estoque Total</div><div class="kpi-value" id="kpi-estoque">—</div><div class="kpi-sub">kg em estoque</div></div>
      </div>

      <!-- Gráficos -->
      <div class="charts-grid">
        <div class="chart-card">
          <h3>Produção Mensal (kg)</h3>
          <div class="chart-wrap"><canvas id="chart-producao"></canvas></div>
        </div>
        <div class="chart-card">
          <h3>Faturamento Mensal (R$)</h3>
          <div class="chart-wrap"><canvas id="chart-fat"></canvas></div>
        </div>
      </div>

      <!-- Metas + Estoque por material -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="card">
          <h3 style="font-size:14px;font-weight:600;margin-bottom:16px">Metas x Realizado</h3>
          <div id="metas-container">
            <div class="loading-spinner"><div class="spinner"></div> Carregando…</div>
          </div>
        </div>
        <div class="table-card">
          <div class="table-card-header"><h3>Estoque Atual por Material</h3></div>
          <div class="table-scroll">
            <table>
              <thead><tr><th>Material</th><th class="text-right">Saldo (kg)</th></tr></thead>
              <tbody id="tb-estoque"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>

<script type="module">
import { initPage, supabase, moeda, peso, mesAtual, anoAtual } from './js/config.js';

await initPage();

const MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
let chartProd, chartFat;

const filtroMes = document.getElementById('filtro-mes');
filtroMes.value = mesAtual();
filtroMes.addEventListener('change', () => carregarDados(filtroMes.value));

async function carregarDados(mes) {
  const [ano, m] = mes.split('-');
  const inicio = `${ano}-${m}-01`;
  const fim    = new Date(ano, m, 0).toISOString().split('T')[0];
  document.getElementById('periodo-label').textContent = `${MESES[+m-1]} de ${ano}`;

  await Promise.all([
    carregarKPIs(inicio, fim),
    carregarGraficos(ano),
    carregarMetas(mes),
    carregarEstoque(),
  ]);
}

async function carregarKPIs(inicio, fim) {
  const [{ data: prod }, { data: ent }, { data: vend }, { data: mov }] = await Promise.all([
    supabase.from('producao').select('peso_produzido_kg').gte('data', inicio).lte('data', fim),
    supabase.from('entradas').select('peso_kg').gte('data', inicio).lte('data', fim),
    supabase.from('vendas').select('valor_total').gte('data', inicio).lte('data', fim),
    supabase.from('estoque_movimentacoes').select('tipo, peso_kg'),
  ]);

  const totProd = (prod||[]).reduce((s,r)=>s+r.peso_produzido_kg,0);
  const totEnt  = (ent||[]).reduce((s,r)=>s+r.peso_kg,0);
  const totFat  = (vend||[]).reduce((s,r)=>s+r.valor_total,0);

  let saldo = 0;
  (mov||[]).forEach(r => { saldo += r.tipo==='entrada' ? r.peso_kg : -r.peso_kg; });

  document.getElementById('kpi-producao').textContent    = peso(totProd);
  document.getElementById('kpi-entradas').textContent    = peso(totEnt);
  document.getElementById('kpi-faturamento').textContent = moeda(totFat);
  document.getElementById('kpi-estoque').textContent     = peso(saldo < 0 ? 0 : saldo);
}

async function carregarGraficos(ano) {
  const inicio = `${ano}-01-01`;
  const fim    = `${ano}-12-31`;

  const [{ data: prods }, { data: vends }] = await Promise.all([
    supabase.from('producao').select('data, peso_produzido_kg').gte('data', inicio).lte('data', fim),
    supabase.from('vendas').select('data, valor_total').gte('data', inicio).lte('data', fim),
  ]);

  const aggProd = Array(12).fill(0);
  const aggFat  = Array(12).fill(0);
  (prods||[]).forEach(r => { aggProd[new Date(r.data+'T00:00:00').getMonth()] += r.peso_produzido_kg; });
  (vends||[]).forEach(r => { aggFat[new Date(r.data+'T00:00:00').getMonth()]  += r.valor_total; });

  const commonOpts = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { grid: { display: false } },
      y: { grid: { color: '#F0F0F0' }, ticks: { font: { size: 11 } } }
    }
  };

  if (chartProd) chartProd.destroy();
  chartProd = new Chart(document.getElementById('chart-producao'), {
    type: 'bar',
    data: {
      labels: MESES,
      datasets: [{ data: aggProd, backgroundColor: '#1B7A43', borderRadius: 5 }]
    },
    options: { ...commonOpts, scales: { ...commonOpts.scales, y: { ...commonOpts.scales.y, ticks: { callback: v => v.toFixed(0)+' kg', font:{size:11} } } } }
  });

  if (chartFat) chartFat.destroy();
  chartFat = new Chart(document.getElementById('chart-fat'), {
    type: 'line',
    data: {
      labels: MESES,
      datasets: [{
        data: aggFat,
        borderColor: '#2E9E5B', backgroundColor: 'rgba(46,158,91,.08)',
        fill: true, tension: .4, pointRadius: 4
      }]
    },
    options: { ...commonOpts, scales: { ...commonOpts.scales, y: { ...commonOpts.scales.y, ticks: { callback: v => 'R$'+v.toLocaleString('pt-BR'), font:{size:10} } } } }
  });
}

async function carregarMetas(mes) {
  const { data: metas } = await supabase.from('metas').select('*').eq('periodo', mes);
  const [ano, m] = mes.split('-');
  const inicio = `${ano}-${m}-01`;
  const fim    = new Date(ano, m, 0).toISOString().split('T')[0];

  const [{ data: prods }, { data: vends }] = await Promise.all([
    supabase.from('producao').select('peso_produzido_kg').gte('data', inicio).lte('data', fim),
    supabase.from('vendas').select('valor_total, peso_kg').gte('data', inicio).lte('data', fim),
  ]);

  const realizado = {
    producao:    (prods||[]).reduce((s,r)=>s+r.peso_produzido_kg,0),
    faturamento: (vends||[]).reduce((s,r)=>s+r.valor_total,0),
    vendas:      (vends||[]).reduce((s,r)=>s+r.peso_kg,0),
  };

  const labels = { producao:'Produção (kg)', faturamento:'Faturamento (R$)', vendas:'Vendas (kg)' };
  const fmt    = { producao: v=>peso(v).replace(' kg',''), faturamento: moeda, vendas: v=>peso(v).replace(' kg','') };

  const cont = document.getElementById('metas-container');
  if (!metas || metas.length === 0) {
    cont.innerHTML = '<p class="text-muted text-center mt-16" style="font-size:13px">Nenhuma meta cadastrada para este período.</p>';
    return;
  }

  cont.innerHTML = metas.map(mt => {
    const real = realizado[mt.indicador] || 0;
    const pct  = mt.valor_meta > 0 ? Math.min((real/mt.valor_meta)*100, 100) : 0;
    const cls  = pct >= 100 ? '' : pct >= 75 ? 'warn' : 'over';
    return `
      <div class="meta-item">
        <div class="meta-header">
          <span>${labels[mt.indicador]}</span>
          <span class="meta-pct">${pct.toFixed(0)}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill ${cls}" style="width:${pct}%"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11.5px;color:var(--text-muted);margin-top:4px">
          <span>${fmt[mt.indicador](real)}</span>
          <span>Meta: ${fmt[mt.indicador](mt.valor_meta)}</span>
        </div>
      </div>
    `;
  }).join('');
}

async function carregarEstoque() {
  const { data: movs } = await supabase.from('estoque_movimentacoes')
    .select('material_id, tipo, peso_kg, materiais(nome)');

  const saldos = {};
  (movs||[]).forEach(r => {
    const nome = r.materiais?.nome || r.material_id;
    if (!saldos[nome]) saldos[nome] = 0;
    saldos[nome] += r.tipo === 'entrada' ? r.peso_kg : -r.peso_kg;
  });

  const tb = document.getElementById('tb-estoque');
  const rows = Object.entries(saldos).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if (rows.length === 0) {
    tb.innerHTML = '<tr><td colspan="2" class="table-empty">Sem estoque</td></tr>';
    return;
  }
  tb.innerHTML = rows.map(([nome, saldo]) => `
    <tr>
      <td>${nome}</td>
      <td class="text-right fw-600">${peso(saldo)}</td>
    </tr>
  `).join('');
}

carregarDados(mesAtual());
</script>
</body>
</html>
