<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comercial — SGR Indaiatuba</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-layout">
  <div id="sidebar-root"></div>
  <div class="main-content">
    <div class="page-header">
      <div><h2>Comercial</h2><p>Vendas de materiais recicláveis</p></div>
      <button class="btn btn-primary" id="btn-nova-venda">+ Nova Venda</button>
    </div>
    <div class="page-body">
      <!-- KPIs -->
      <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
        <div class="kpi-card"><div class="kpi-label">Faturamento do Mês</div><div class="kpi-value" id="kpi-fat">—</div><div class="kpi-sub">em vendas</div></div>
        <div class="kpi-card"><div class="kpi-label">Peso Vendido</div><div class="kpi-value" id="kpi-peso">—</div><div class="kpi-sub">kg no período</div></div>
        <div class="kpi-card"><div class="kpi-label">Número de Vendas</div><div class="kpi-value" id="kpi-qtd">—</div><div class="kpi-sub">transações</div></div>
        <div class="kpi-card"><div class="kpi-label">Ticket Médio</div><div class="kpi-value" id="kpi-ticket">—</div><div class="kpi-sub">por venda</div></div>
      </div>

      <!-- Filtros -->
      <div class="card mb-16" style="padding:16px">
        <div class="filters-row">
          <div class="form-group"><label>Mês</label><input type="month" id="f-mes" /></div>
          <div class="form-group"><label>Cliente</label><select id="f-cliente"><option value="">Todos</option></select></div>
          <div class="form-group"><label>Material</label><select id="f-mat"><option value="">Todos</option></select></div>
          <div class="form-group" style="justify-content:flex-end"><label>&nbsp;</label><button class="btn btn-primary" id="btn-filtrar">Filtrar</button></div>
        </div>
      </div>

      <!-- Tabela vendas -->
      <div class="table-card">
        <div class="table-card-header">
          <h3>Registro de Vendas</h3>
          <span id="venda-count" class="text-muted" style="font-size:12px"></span>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr><th>Data</th><th>Cliente</th><th>Material</th><th class="text-right">Peso (kg)</th><th class="text-right">Valor Total</th><th class="text-right">R$/kg</th><th>Ações</th></tr>
            </thead>
            <tbody id="tb-vendas"></tbody>
          </table>
        </div>
      </div>

      <!-- Clientes CRUD -->
      <div class="table-card">
        <div class="table-card-header">
          <h3>Clientes</h3>
          <button class="btn btn-sm btn-primary" id="btn-novo-cliente">+ Adicionar</button>
        </div>
        <div class="table-scroll">
          <table>
            <thead><tr><th>Nome</th><th>Documento</th><th>Contato</th><th>Status</th><th>Ações</th></tr></thead>
            <tbody id="tb-clientes"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Nova/Editar Venda -->
<div class="modal-backdrop" id="modal-venda">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-venda-title">Nova Venda</h3>
      <button class="modal-close" data-close="modal-venda">✕</button>
    </div>
    <div class="modal-body">
      <form id="form-venda">
        <input type="hidden" name="id" />
        <div class="form-grid">
          <div class="form-group"><label>Data *</label><input type="date" name="data" required /></div>
          <div class="form-group"><label>Cliente *</label><select name="cliente_id" required><option value="">Selecione…</option></select></div>
          <div class="form-group"><label>Material *</label><select name="material_id" required><option value="">Selecione…</option></select></div>
          <div class="form-group"><label>Peso (kg) *</label><input type="number" name="peso_kg" min="0.01" step="0.01" required /></div>
          <div class="form-group full"><label>Valor Total (R$) *</label><input type="number" name="valor_total" min="0.01" step="0.01" required /></div>
        </div>
        <div id="saldo-aviso" style="margin-top:10px;font-size:12px;color:var(--text-muted)"></div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" data-close="modal-venda">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar-venda">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal: Cliente -->
<div class="modal-backdrop" id="modal-cliente">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-cli-title">Novo Cliente</h3>
      <button class="modal-close" data-close="modal-cliente">✕</button>
    </div>
    <div class="modal-body">
      <form id="form-cliente">
        <input type="hidden" name="id" />
        <div class="form-grid">
          <div class="form-group full"><label>Nome *</label><input type="text" name="nome" required /></div>
          <div class="form-group"><label>Documento (CPF/CNPJ)</label><input type="text" name="documento" /></div>
          <div class="form-group"><label>Contato</label><input type="text" name="contato" /></div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" data-close="modal-cliente">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar-cliente">Salvar</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script type="module">
import { initPage, supabase, moeda, peso, dataBR, toast, abrirModal, fecharModal, mesAtual } from './js/config.js';

await initPage();

let perfil, clientes = [], materiais = [], vendasData = [];

async function init() {
  const { data: { user } } = await supabase.auth.getUser();
  const { data: p } = await supabase.from('profiles').select('*').eq('id', user.id).single();
  perfil = p;

  const [{ data: cl }, { data: mt }] = await Promise.all([
    supabase.from('clientes').select('*').eq('ativo', true).order('nome'),
    supabase.from('materiais').select('*').eq('ativo', true).order('nome'),
  ]);
  clientes  = cl || [];
  materiais = mt || [];

  popularSelects();
  document.getElementById('f-mes').value = mesAtual();
  await Promise.all([carregarVendas(), carregarClientes()]);
}

function popularSelects() {
  const clOpts = clientes.map(c=>`<option value="${c.id}">${c.nome}</option>`).join('');
  const mtOpts = materiais.map(m=>`<option value="${m.id}">${m.nome}</option>`).join('');

  document.getElementById('f-cliente').innerHTML = '<option value="">Todos</option>' + clOpts;
  document.getElementById('f-mat').innerHTML     = '<option value="">Todos</option>' + mtOpts;
  document.querySelector('#form-venda [name="cliente_id"]').innerHTML  = '<option value="">Selecione…</option>' + clOpts;
  document.querySelector('#form-venda [name="material_id"]').innerHTML = '<option value="">Selecione…</option>' + mtOpts;
}

async function carregarVendas() {
  let q = supabase.from('vendas')
    .select('*, clientes(nome), materiais(nome)')
    .order('data', { ascending: false });

  const mes = document.getElementById('f-mes').value;
  const cli = document.getElementById('f-cliente').value;
  const mat = document.getElementById('f-mat').value;

  if (mes) {
    const [y,m] = mes.split('-');
    q = q.gte('data',`${y}-${m}-01`).lte('data', new Date(y,m,0).toISOString().split('T')[0]);
  }
  if (cli) q = q.eq('cliente_id', cli);
  if (mat) q = q.eq('material_id', mat);

  const { data } = await q;
  vendasData = data || [];

  const totFat    = vendasData.reduce((s,r)=>s+r.valor_total,0);
  const totPeso   = vendasData.reduce((s,r)=>s+r.peso_kg,0);
  const ticket    = vendasData.length ? totFat/vendasData.length : 0;

  document.getElementById('kpi-fat').textContent    = moeda(totFat);
  document.getElementById('kpi-peso').textContent   = peso(totPeso);
  document.getElementById('kpi-qtd').textContent    = vendasData.length;
  document.getElementById('kpi-ticket').textContent = moeda(ticket);
  document.getElementById('venda-count').textContent = `${vendasData.length} registros`;

  const isAdmin = perfil?.role === 'admin';
  const tb = document.getElementById('tb-vendas');
  if (!vendasData.length) {
    tb.innerHTML = '<tr><td colspan="7" class="table-empty">Nenhuma venda encontrada</td></tr>';
    return;
  }
  tb.innerHTML = vendasData.map(r => `
    <tr>
      <td>${dataBR(r.data)}</td>
      <td>${r.clientes?.nome||'—'}</td>
      <td>${r.materiais?.nome||'—'}</td>
      <td class="text-right">${peso(r.peso_kg)}</td>
      <td class="text-right fw-600">${moeda(r.valor_total)}</td>
      <td class="text-right">${moeda(r.peso_kg>0?r.valor_total/r.peso_kg:0)}</td>
      <td>${isAdmin?`
        <button class="btn-icon" onclick="editarVenda('${r.id}')">✏️</button>
        <button class="btn-icon danger" onclick="excluirVenda('${r.id}')">🗑️</button>
      `:'—'}</td>
    </tr>
  `).join('');
}

async function carregarClientes() {
  const { data } = await supabase.from('clientes').select('*').order('nome');
  const isAdmin = perfil?.role === 'admin';
  document.getElementById('tb-clientes').innerHTML = (data||[]).map(c=>`
    <tr>
      <td>${c.nome}</td>
      <td>${c.documento||'—'}</td>
      <td>${c.contato||'—'}</td>
      <td><span class="badge ${c.ativo?'badge-green':'badge-gray'}">${c.ativo?'Ativo':'Inativo'}</span></td>
      <td>${isAdmin?`
        <button class="btn-icon" onclick="editarCliente(${JSON.stringify(c).replace(/"/g,'&quot;')})">✏️</button>
        <button class="btn-icon danger" onclick="toggleCliente('${c.id}',${c.ativo})">${c.ativo?'🚫':'✅'}</button>
      `:'—'}</td>
    </tr>
  `).join('') || '<tr><td colspan="5" class="table-empty">Nenhum cliente</td></tr>';
}

/* ── Mostrar saldo disponível ao selecionar material ── */
async function atualizarSaldoInfo() {
  const matId = document.querySelector('#form-venda [name="material_id"]').value;
  const aviso = document.getElementById('saldo-aviso');
  if (!matId) { aviso.textContent = ''; return; }
  const { data: movs } = await supabase.from('estoque_movimentacoes')
    .select('tipo, peso_kg').eq('material_id', matId);
  let saldo = 0;
  (movs||[]).forEach(r => { saldo += r.tipo==='entrada' ? r.peso_kg : -r.peso_kg; });
  aviso.innerHTML = `Saldo disponível em estoque: <strong>${peso(saldo)}</strong>`;
  aviso.style.color = saldo <= 0 ? 'var(--danger)' : 'var(--text-muted)';
}
document.querySelector('#form-venda [name="material_id"]').addEventListener('change', atualizarSaldoInfo);

/* ── Venda CRUD ── */
document.getElementById('btn-nova-venda').addEventListener('click', () => {
  document.getElementById('modal-venda-title').textContent = 'Nova Venda';
  document.getElementById('form-venda').reset();
  document.querySelector('#form-venda [name="id"]').value = '';
  document.getElementById('saldo-aviso').textContent = '';
  abrirModal('modal-venda');
});

window.editarVenda = id => {
  const r = vendasData.find(v=>v.id===id);
  if (!r) return;
  document.getElementById('modal-venda-title').textContent = 'Editar Venda';
  const f = document.getElementById('form-venda');
  f.querySelector('[name="id"]').value         = r.id;
  f.querySelector('[name="data"]').value       = r.data;
  f.querySelector('[name="cliente_id"]').value = r.cliente_id;
  f.querySelector('[name="material_id"]').value = r.material_id;
  f.querySelector('[name="peso_kg"]').value    = r.peso_kg;
  f.querySelector('[name="valor_total"]').value = r.valor_total;
  atualizarSaldoInfo();
  abrirModal('modal-venda');
};

document.getElementById('btn-salvar-venda').addEventListener('click', async () => {
  const f = document.getElementById('form-venda');
  if (!f.checkValidity()) { f.reportValidity(); return; }
  const fd = Object.fromEntries(new FormData(f));
  const { data: { user } } = await supabase.auth.getUser();
  const payload = {
    cliente_id:  fd.cliente_id,
    material_id: fd.material_id,
    peso_kg:     parseFloat(fd.peso_kg),
    valor_total: parseFloat(fd.valor_total),
    data:        fd.data,
    criado_por:  user.id,
  };

  if (fd.id) {
    /* Edição: reverter movs antigos */
    await supabase.from('estoque_movimentacoes').delete().eq('origem_id', fd.id);
    await supabase.from('financeiro_lancamentos').delete().eq('descricao', `Venda #${fd.id}`);
    await supabase.from('vendas').update(payload).eq('id', fd.id);
    await criarMovsVenda(payload, fd.id);
    toast('Venda atualizada!');
  } else {
    const { data: nova, error } = await supabase.from('vendas').insert(payload).select().single();
    if (error) { toast('Erro ao salvar venda','error'); return; }
    await criarMovsVenda(payload, nova.id);
    toast('Venda registrada!');
  }
  fecharModal('modal-venda');
  carregarVendas();
});

async function criarMovsVenda(payload, id) {
  await supabase.from('estoque_movimentacoes').insert({
    material_id: payload.material_id, tipo: 'saida', peso_kg: payload.peso_kg,
    origem_tipo: 'venda', origem_id: id, data: payload.data
  });
  await supabase.from('financeiro_lancamentos').insert({
    tipo: 'receita', categoria: 'Venda de Material',
    descricao: `Venda #${id}`,
    valor: payload.valor_total, data: payload.data,
    criado_por: payload.criado_por
  });
}

window.excluirVenda = async id => {
  if (!confirm('Excluir esta venda? O estoque e financeiro serão revertidos.')) return;
  await supabase.from('estoque_movimentacoes').delete().eq('origem_id', id);
  await supabase.from('financeiro_lancamentos').delete().eq('descricao', `Venda #${id}`);
  await supabase.from('vendas').delete().eq('id', id);
  toast('Venda excluída e estoque revertido!');
  carregarVendas();
};

/* ── Cliente CRUD ── */
document.getElementById('btn-novo-cliente').addEventListener('click', () => {
  document.getElementById('modal-cli-title').textContent = 'Novo Cliente';
  document.getElementById('form-cliente').reset();
  document.querySelector('#form-cliente [name="id"]').value = '';
  abrirModal('modal-cliente');
});
window.editarCliente = c => {
  document.getElementById('modal-cli-title').textContent = 'Editar Cliente';
  const f = document.getElementById('form-cliente');
  f.querySelector('[name="id"]').value        = c.id;
  f.querySelector('[name="nome"]').value      = c.nome;
  f.querySelector('[name="documento"]').value = c.documento||'';
  f.querySelector('[name="contato"]').value   = c.contato||'';
  abrirModal('modal-cliente');
};
window.toggleCliente = async (id, ativo) => {
  await supabase.from('clientes').update({ ativo: !ativo }).eq('id', id);
  carregarClientes();
};
document.getElementById('btn-salvar-cliente').addEventListener('click', async () => {
  const f = document.getElementById('form-cliente');
  if (!f.checkValidity()) { f.reportValidity(); return; }
  const fd = Object.fromEntries(new FormData(f));
  const payload = { nome: fd.nome, documento: fd.documento, contato: fd.contato };
  if (fd.id) { await supabase.from('clientes').update(payload).eq('id', fd.id); toast('Cliente atualizado!'); }
  else       { await supabase.from('clientes').insert(payload); toast('Cliente criado!'); }
  fecharModal('modal-cliente');
  const { data: cl } = await supabase.from('clientes').select('*').eq('ativo',true).order('nome');
  clientes = cl||[];
  popularSelects();
  carregarClientes();
});

document.getElementById('btn-filtrar').addEventListener('click', carregarVendas);
document.querySelectorAll('[data-close]').forEach(btn => btn.addEventListener('click', () => fecharModal(btn.dataset.close)));
document.querySelectorAll('.modal-backdrop').forEach(m => m.addEventListener('click', e => { if(e.target===m) fecharModal(m.id); }));

await init();
</script>
</body>
</html>
