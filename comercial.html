<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comercial — SGR Indaiatuba</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-root"></div>
  <div class="main-content">
    <div class="page-header">
      <div><h2>Comercial</h2><p>Vendas e faturamento</p></div>
      <button class="btn btn-primary" id="btn-nova-venda">+ Nova Venda</button>
    </div>
    <div class="page-body">

      <!-- KPIs -->
      <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">
        <div class="kpi-card">
          <div class="kpi-label">Faturamento</div>
          <div class="kpi-value" id="kpi-fat">—</div>
          <div class="kpi-sub" id="kpi-fat-sub">no período</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Volume Vendido</div>
          <div class="kpi-value" id="kpi-vol">—</div>
          <div class="kpi-sub">kg no período</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Ticket Médio</div>
          <div class="kpi-value" id="kpi-ticket">—</div>
          <div class="kpi-sub">R$/venda</div>
        </div>
      </div>

      <!-- Gráfico: Vendas por Cliente -->
      <div class="card mb-16" style="padding:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
          <h4>Acompanhamento de Vendas por Cliente</h4>
          <div style="display:flex;gap:8px;align-items:center">
            <label style="font-size:13px">Período:</label>
            <select id="chart-tipo" style="font-size:13px;padding:4px 8px;border:1px solid #e2e8f0;border-radius:6px">
              <option value="mes">Mês atual</option>
              <option value="3m">Últimos 3 meses</option>
              <option value="6m">Últimos 6 meses</option>
              <option value="ano">Ano atual</option>
            </select>
          </div>
        </div>
        <canvas id="chart-clientes" height="120"></canvas>
      </div>

      <!-- Gráfico: Faturamento mensal por cliente -->
      <div class="card mb-16" style="padding:16px">
        <h4 style="margin-bottom:12px">Evolução Mensal por Cliente</h4>
        <div style="margin-bottom:8px">
          <select id="sel-cliente-chart" style="font-size:13px;padding:4px 8px;border:1px solid #e2e8f0;border-radius:6px">
            <option value="">Todos os clientes</option>
          </select>
        </div>
        <canvas id="chart-evolucao" height="120"></canvas>
      </div>

      <!-- Filtros tabela -->
      <div class="card mb-16" style="padding:16px">
        <div class="filters-row">
          <div class="form-group"><label>Período</label><input type="month" id="f-mes" /></div>
          <div class="form-group"><label>Cliente</label><select id="f-cliente"><option value="">Todos</option></select></div>
          <div class="form-group"><label>Material</label><select id="f-mat"><option value="">Todos</option></select></div>
          <div class="form-group" style="justify-content:flex-end"><label>&nbsp;</label>
            <button class="btn btn-primary" id="btn-filtrar">Filtrar</button>
          </div>
        </div>
      </div>

      <!-- Tabela -->
      <div class="table-card">
        <div class="table-card-header">
          <h3>Registro de Vendas</h3>
          <span id="vnd-count" class="text-muted" style="font-size:12px"></span>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>Data</th>
                <th>Cliente</th>
                <th>Material</th>
                <th class="text-right">Peso (kg)</th>
                <th class="text-right">Preço/kg</th>
                <th class="text-right">Total (R$)</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tb-vendas"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Nova / Editar Venda -->
<div class="modal-backdrop" id="modal-venda">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-venda-title">Nova Venda</h3>
      <button class="modal-close" data-close="modal-venda">✕</button>
    </div>
    <div class="modal-body">
      <form id="form-venda">
        <input type="hidden" name="id" />
        <div class="form-grid">
          <div class="form-group"><label>Data *</label><input type="date" name="data" required /></div>
          <div class="form-group"><label>Cliente *</label><select name="cliente_id" required><option value="">Selecione…</option></select></div>
          <div class="form-group"><label>Material *</label><select name="material_id" required><option value="">Selecione…</option></select></div>
          <div class="form-group"><label>Peso (kg) *</label><input type="number" name="peso_kg" min="0.01" step="0.01" required /></div>
          <div class="form-group"><label>Preço por kg (R$) *</label><input type="number" name="preco_kg" min="0" step="0.01" required /></div>
          <div class="form-group"><label>Valor Total (R$)</label><input type="number" name="valor_total" min="0" step="0.01" readonly style="background:#f8fafc" /></div>
          <div class="form-group full"><label>Observação</label><input type="text" name="observacao" /></div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" data-close="modal-venda">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar-venda">Salvar</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script type="module">
import { initPage, supabase, moeda, peso, dataBR, toast, abrirModal, fecharModal, mesAtual, anoAtual } from './js/config.js';

await initPage();

let perfil, vendaData = [], clienteData = [], matData = [];
let chartClientes = null, chartEvolucao = null;

const mesDefault = `${anoAtual()}-${String(mesAtual()).padStart(2,'0')}`;
document.getElementById('f-mes').value = mesDefault;

// ── auto-calc total ───────────────────────────────────────────────────────────
['peso_kg','preco_kg'].forEach(n => {
  document.querySelector(`#form-venda [name="${n}"]`).addEventListener('input', () => {
    const pk = parseFloat(document.querySelector('#form-venda [name="peso_kg"]').value)||0;
    const pr = parseFloat(document.querySelector('#form-venda [name="preco_kg"]').value)||0;
    document.querySelector('#form-venda [name="valor_total"]').value = (pk*pr).toFixed(2);
  });
});

// ── init ─────────────────────────────────────────────────────────────────────
async function init() {
  const { data: { user } } = await supabase.auth.getUser();
  const { data: p } = await supabase.from('profiles').select('*').eq('id', user.id).single();
  perfil = p;

  const [{ data: clientes }, { data: mats }] = await Promise.all([
    supabase.from('clientes').select('*').order('nome'),
    supabase.from('materiais').select('*').order('nome'),
  ]);
  clienteData = clientes || [];
  matData     = mats     || [];

  const cliOpts = clienteData.map(c=>`<option value="${c.id}">${c.nome}</option>`).join('');
  const matOpts = matData.map(m=>`<option value="${m.id}">${m.nome}</option>`).join('');

  document.getElementById('f-cliente').innerHTML    = '<option value="">Todos</option>' + cliOpts;
  document.getElementById('sel-cliente-chart').innerHTML = '<option value="">Todos os clientes</option>' + cliOpts;
  document.querySelector('#form-venda [name="cliente_id"]').innerHTML = '<option value="">Selecione…</option>' + cliOpts;
  document.querySelector('#form-venda [name="material_id"]').innerHTML = '<option value="">Selecione…</option>' + matOpts;
  document.getElementById('f-mat').innerHTML = '<option value="">Todos</option>' + matOpts;

  await Promise.all([carregar(), carregarGraficos()]);
}

function periodoRange(mes) {
  const [y,m] = mes.split('-');
  return { ini:`${y}-${m}-01`, fim:new Date(+y,+m,0).toISOString().split('T')[0] };
}

async function carregar() {
  const mes  = document.getElementById('f-mes').value;
  const cli  = document.getElementById('f-cliente').value;
  const mat  = document.getElementById('f-mat').value;
  const { ini, fim } = periodoRange(mes);

  let q = supabase.from('vendas')
    .select('*, clientes(nome), materiais(nome)')
    .gte('data', ini).lte('data', fim)
    .order('data', { ascending: false });

  if (cli) q = q.eq('cliente_id', cli);
  if (mat) q = q.eq('material_id', mat);

  const { data } = await q;
  vendaData = data || [];
  renderKPIs();
  renderTabela();
}

function renderKPIs() {
  let fat = 0, vol = 0;
  vendaData.forEach(r => { fat += r.valor||0; vol += r.peso_kg||0; });
  document.getElementById('kpi-fat').textContent    = moeda(fat);
  document.getElementById('kpi-vol').textContent    = peso(vol);
  document.getElementById('kpi-ticket').textContent = vendaData.length ? moeda(fat/vendaData.length) : '—';
}

function renderTabela() {
  const isAdmin = perfil?.role === 'admin';
  document.getElementById('vnd-count').textContent = `${vendaData.length} vendas`;
  const tb = document.getElementById('tb-vendas');
  if (!vendaData.length) {
    tb.innerHTML = '<tr><td colspan="7" class="table-empty">Nenhuma venda encontrada</td></tr>';
    return;
  }
  tb.innerHTML = vendaData.map(r => `
    <tr>
      <td>${dataBR(r.data)}</td>
      <td>${r.clientes?.nome||'—'}</td>
      <td>${r.materiais?.nome||'—'}</td>
      <td class="text-right">${peso(r.peso_kg)}</td>
      <td class="text-right">${r.preco_kg ? moeda(r.preco_kg) : '—'}</td>
      <td class="text-right fw-600">${moeda(r.valor||0)}</td>
      <td>
        ${isAdmin ? `
          <button class="btn-icon" onclick="editarVenda('${r.id}')">✏️</button>
          <button class="btn-icon danger" onclick="excluirVenda('${r.id}')">🗑️</button>
        ` : '—'}
      </td>
    </tr>
  `).join('');
}

// ── Gráficos ──────────────────────────────────────────────────────────────────
async function carregarGraficos() {
  const tipo = document.getElementById('chart-tipo').value;
  const ano  = anoAtual();
  const mesA = mesAtual();

  let dataInicio;
  if (tipo === 'mes') {
    dataInicio = `${ano}-${String(mesA).padStart(2,'0')}-01`;
  } else if (tipo === '3m') {
    const d = new Date(ano, mesA-3, 1);
    dataInicio = d.toISOString().split('T')[0];
  } else if (tipo === '6m') {
    const d = new Date(ano, mesA-6, 1);
    dataInicio = d.toISOString().split('T')[0];
  } else {
    dataInicio = `${ano}-01-01`;
  }

  const { data } = await supabase.from('vendas')
    .select('*, clientes(nome), materiais(nome)')
    .gte('data', dataInicio)
    .order('data');

  const rows = data || [];

  // Vendas por cliente (barras)
  const cliMap = {};
  rows.forEach(r => {
    const nome = r.clientes?.nome || 'Desconhecido';
    if (!cliMap[nome]) cliMap[nome] = { vol:0, fat:0 };
    cliMap[nome].vol += r.peso_kg||0;
    cliMap[nome].fat += r.valor||0;
  });
  const labCli = Object.keys(cliMap).sort((a,b)=>cliMap[b].fat-cliMap[a].fat);

  if (chartClientes) chartClientes.destroy();
  chartClientes = new Chart(document.getElementById('chart-clientes').getContext('2d'), {
    type: 'bar',
    data: {
      labels: labCli,
      datasets: [
        { label:'Faturamento (R$)', data: labCli.map(l=>cliMap[l].fat), backgroundColor:'#3b82f6', yAxisID:'y' },
        { label:'Volume (kg)',      data: labCli.map(l=>cliMap[l].vol), backgroundColor:'#10b981', yAxisID:'y2', type:'line', tension:0.3 },
      ]
    },
    options: {
      responsive:true,
      plugins:{ legend:{ position:'bottom' } },
      scales: {
        y:  { beginAtZero:true, ticks:{ callback:v=>'R$'+v.toLocaleString('pt-BR') }, position:'left' },
        y2: { beginAtZero:true, ticks:{ callback:v=>v.toLocaleString('pt-BR')+'kg' }, position:'right', grid:{drawOnChartArea:false} },
      }
    }
  });

  // Evolução mensal
  await carregarEvolucao(rows);
}

async function carregarEvolucao(rows) {
  const cliSel = document.getElementById('sel-cliente-chart').value;
  const filtrado = cliSel ? rows.filter(r=>r.cliente_id===cliSel) : rows;

  const meses = {};
  filtrado.forEach(r => {
    const key = r.data.substring(0,7);
    if (!meses[key]) meses[key] = 0;
    meses[key] += r.valor||0;
  });
  const labMes = Object.keys(meses).sort();

  if (chartEvolucao) chartEvolucao.destroy();
  chartEvolucao = new Chart(document.getElementById('chart-evolucao').getContext('2d'), {
    type: 'line',
    data: {
      labels: labMes.map(l => {
        const [y,m] = l.split('-');
        return new Date(+y,+m-1,1).toLocaleDateString('pt-BR',{month:'short',year:'2-digit'});
      }),
      datasets: [{
        label: cliSel ? (clienteData.find(c=>c.id===cliSel)?.nome||'Cliente') : 'Total',
        data: labMes.map(l=>meses[l]),
        borderColor:'#3b82f6', backgroundColor:'#dbeafe', fill:true, tension:0.3,
      }]
    },
    options: {
      responsive:true,
      plugins:{ legend:{ display:false } },
      scales:{ y:{ beginAtZero:true, ticks:{ callback:v=>'R$'+v.toLocaleString('pt-BR') } } }
    }
  });
}

document.getElementById('chart-tipo').addEventListener('change', carregarGraficos);
document.getElementById('sel-cliente-chart').addEventListener('change', carregarGraficos);

// ── CRUD ──────────────────────────────────────────────────────────────────────
document.getElementById('btn-nova-venda').addEventListener('click', () => {
  document.getElementById('modal-venda-title').textContent = 'Nova Venda';
  document.getElementById('form-venda').reset();
  document.querySelector('#form-venda [name="id"]').value = '';
  document.querySelector('#form-venda [name="data"]').value = new Date().toISOString().split('T')[0];
  abrirModal('modal-venda');
});

window.editarVenda = id => {
  const r = vendaData.find(v=>v.id===id);
  if (!r) return;
  document.getElementById('modal-venda-title').textContent = 'Editar Venda';
  const f = document.getElementById('form-venda');
  const set = (n,v) => { const el=f.querySelector(`[name="${n}"]`); if(el) el.value=v??''; };
  set('id',r.id); set('data',r.data); set('cliente_id',r.cliente_id);
  set('material_id',r.material_id); set('peso_kg',r.peso_kg);
  set('preco_kg',r.preco_kg); set('valor_total',r.valor);
  set('observacao',r.observacao);
  abrirModal('modal-venda');
};

window.excluirVenda = async id => {
  if (!confirm('Excluir esta venda?')) return;
  const { error } = await supabase.from('vendas').delete().eq('id', id);
  if (error) { toast('Erro ao excluir','error'); return; }
  await supabase.from('estoque_movimentacoes').delete().eq('origem_id',id).eq('origem_tipo','venda');
  toast('Venda excluída!');
  carregar(); carregarGraficos();
};

document.getElementById('btn-salvar-venda').addEventListener('click', async () => {
  const f = document.getElementById('form-venda');
  if (!f.checkValidity()) { f.reportValidity(); return; }
  const fd = Object.fromEntries(new FormData(f));
  const pk = parseFloat(fd.peso_kg)||0;
  const pr = parseFloat(fd.preco_kg)||0;
  const payload = {
    data:fd.data, cliente_id:fd.cliente_id, material_id:fd.material_id,
    peso_kg:pk, preco_kg:pr, valor:pk*pr, observacao:fd.observacao||null,
  };
  if (fd.id) {
    const { error } = await supabase.from('vendas').update(payload).eq('id',fd.id);
    if (error) { toast('Erro ao atualizar','error'); return; }
    toast('Venda atualizada!');
  } else {
    const { data:nova, error } = await supabase.from('vendas').insert(payload).select().single();
    if (error) { toast('Erro ao salvar','error'); return; }
    await supabase.from('estoque_movimentacoes').insert({
      material_id:payload.material_id, tipo:'saida', peso_kg:pk,
      origem_tipo:'venda', origem_id:nova.id, data:payload.data,
    });
    await supabase.from('financeiro').insert({
      tipo:'receita', descricao:`Venda — ${nova.id}`,
      valor:payload.valor, data:payload.data, referencia_tipo:'venda', referencia_id:nova.id,
    });
    toast('Venda registrada!');
  }
  fecharModal('modal-venda');
  carregar(); carregarGraficos();
});

document.getElementById('btn-filtrar').addEventListener('click', carregar);
document.querySelectorAll('[data-close]').forEach(btn=>btn.addEventListener('click',()=>fecharModal(btn.dataset.close)));
document.querySelectorAll('.modal-backdrop').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)fecharModal(m.id);}));

await init();
</script>
</body>
</html>
