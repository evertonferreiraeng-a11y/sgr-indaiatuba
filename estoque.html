<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estoque — SGR Indaiatuba</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .edit-cell { cursor:pointer; }
    .edit-cell:hover { background:#f0f9ff; }
    .inline-input { border:1px solid #2563eb; border-radius:4px; padding:3px 6px; font-size:14px; width:100%; box-sizing:border-box; }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-root"></div>
  <div class="main-content">
    <div class="page-header">
      <div><h2>Estoque</h2><p>Saldo atual de materiais</p></div>
      <button class="btn btn-primary" id="btn-add-mat">+ Adicionar Material</button>
    </div>
    <div class="page-body">

      <!-- KPIs -->
      <div class="kpi-grid" style="grid-template-columns:repeat(2,1fr);max-width:480px">
        <div class="kpi-card">
          <div class="kpi-label">Volume Total em Estoque</div>
          <div class="kpi-value" id="kpi-kg">—</div>
          <div class="kpi-sub">kg</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Valor Total em Estoque</div>
          <div class="kpi-value" id="kpi-valor">—</div>
          <div class="kpi-sub">estimado</div>
        </div>
      </div>

      <!-- Tabela -->
      <div class="table-card">
        <div class="table-card-header">
          <h3>Materiais em Estoque</h3>
          <span class="text-muted" style="font-size:12px">Clique nos campos para editar</span>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>Material</th>
                <th class="text-right">Kg em Estoque</th>
                <th class="text-right">Valor Unitário (R$/kg)</th>
                <th class="text-right">Valor Total</th>
                <th>Observação</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tb-estoque"></tbody>
            <tfoot id="tf-estoque"></tfoot>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal: Adicionar Material ao Estoque -->
<div class="modal-backdrop" id="modal-add">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3>Adicionar Material ao Estoque</h3>
      <button class="modal-close" data-close="modal-add">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group full">
        <label>Material *</label>
        <select id="sel-mat-add" style="width:100%"><option value="">Selecione…</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" data-close="modal-add">Cancelar</button>
      <button class="btn btn-primary" id="btn-confirmar-add">Adicionar</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script type="module">
import { initPage, supabase, toast, abrirModal, fecharModal } from './js/config.js';

await initPage();

let perfil, matsData = [], todosMateria = [];

async function init() {
  const { data: { user } } = await supabase.auth.getUser();
  const { data: p } = await supabase.from('profiles').select('*').eq('id', user.id).single();
  perfil = p;
  await carregar();
}

async function carregar() {
  const { data: mats } = await supabase.from('materiais').select('*').order('nome');
  todosMateria = mats || [];
  matsData     = todosMateria.filter(m => m.no_estoque);
  renderTabela();
  atualizarSelectAdd();
}

function atualizarSelectAdd() {
  const disponiveis = todosMateria.filter(m => !m.no_estoque);
  const sel = document.getElementById('sel-mat-add');
  sel.innerHTML = '<option value="">Selecione…</option>' +
    disponiveis.map(m => `<option value="${m.id}">${m.nome}</option>`).join('');
}

function renderTabela() {
  const isAdmin = perfil?.role === 'admin';
  const tb = document.getElementById('tb-estoque');

  if (!matsData.length) {
    tb.innerHTML = `<tr><td colspan="6" class="table-empty">Nenhum material adicionado ao estoque. Clique em "+ Adicionar Material".</td></tr>`;
    document.getElementById('tf-estoque').innerHTML = '';
    document.getElementById('kpi-kg').textContent    = '0';
    document.getElementById('kpi-valor').textContent = 'R$ 0,00';
    return;
  }

  let totalKg = 0, totalValor = 0;

  tb.innerHTML = matsData.map(m => {
    const kg         = parseFloat(m.estoque_kg)    || 0;
    const vUnit      = parseFloat(m.valor_unitario) || 0;
    const vTotal     = kg * vUnit;
    totalKg    += kg;
    totalValor += vTotal;

    const tdKg = isAdmin
      ? `<td class="text-right edit-cell" title="Clique para editar" onclick="editNum(this,'${m.id}','estoque_kg',${kg})">${fmtKg(kg)}</td>`
      : `<td class="text-right">${fmtKg(kg)}</td>`;

    const tdVu = isAdmin
      ? `<td class="text-right edit-cell" title="Clique para editar" onclick="editNum(this,'${m.id}','valor_unitario',${vUnit})">${fmtNum(vUnit)}</td>`
      : `<td class="text-right">${fmtNum(vUnit)}</td>`;

    const tdObs = isAdmin
      ? `<td class="edit-cell" title="Clique para editar" onclick="editTxt(this,'${m.id}','observacao','${(m.observacao||'').replace(/'/g,'\\')}')">
           ${m.observacao || '<span style="color:#94a3b8;font-size:12px">Adicionar…</span>'}
         </td>`
      : `<td>${m.observacao || '—'}</td>`;

    const tdAcoes = isAdmin
      ? `<td><button class="btn-icon danger" title="Remover do estoque" onclick="removerDoEstoque('${m.id}')">🗑️</button></td>`
      : '<td></td>';

    return `<tr>
      <td><strong>${m.nome}</strong></td>
      ${tdKg}
      ${tdVu}
      <td class="text-right fw-600${vTotal > 0 ? ' text-green' : ''}">${fmtMoeda(vTotal)}</td>
      ${tdObs}
      ${tdAcoes}
    </tr>`;
  }).join('');

  document.getElementById('tf-estoque').innerHTML = `
    <tr style="background:#f8fafc;font-weight:700;border-top:2px solid #e2e8f0">
      <td>TOTAL</td>
      <td class="text-right">${fmtKg(totalKg)}</td>
      <td></td>
      <td class="text-right" style="color:#16a34a">${fmtMoeda(totalValor)}</td>
      <td colspan="2"></td>
    </tr>`;

  document.getElementById('kpi-kg').textContent    = fmtKg(totalKg);
  document.getElementById('kpi-valor').textContent = fmtMoeda(totalValor);
}

// ── Formatação ────────────────────────────────────────────────────────────────
function fmtKg(v)    { return v.toLocaleString('pt-BR',{maximumFractionDigits:2}) + ' kg'; }
function fmtNum(v)   { return v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtMoeda(v) { return 'R$ ' + v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }

// ── Edição inline numérica ────────────────────────────────────────────────────
window.editNum = (td, matId, campo, valorAtual) => {
  if (td.querySelector('input')) return;
  const orig = td.innerHTML;
  td.innerHTML = `<input class="inline-input" type="number" min="0" step="0.01" value="${valorAtual}" style="text-align:right" />`;
  const inp = td.querySelector('input');
  inp.focus(); inp.select();
  const salvar = async () => {
    const val = parseFloat(inp.value) || 0;
    const { error } = await supabase.from('materiais').update({ [campo]: val }).eq('id', matId);
    if (error) { toast('Erro: ' + error.message, 'error'); td.innerHTML = orig; return; }
    const m = matsData.find(x => x.id === matId);
    if (m) m[campo] = val;
    renderTabela();
  };
  inp.addEventListener('blur', salvar);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { td.innerHTML = orig; }
  });
};

// ── Edição inline texto ───────────────────────────────────────────────────────
window.editTxt = (td, matId, campo, valorAtual) => {
  if (td.querySelector('input')) return;
  const orig = td.innerHTML;
  td.innerHTML = `<input class="inline-input" type="text" value="${valorAtual}" placeholder="Observação…" />`;
  const inp = td.querySelector('input');
  inp.focus(); inp.select();
  const salvar = async () => {
    const val = inp.value.trim() || null;
    const { error } = await supabase.from('materiais').update({ [campo]: val }).eq('id', matId);
    if (error) { toast('Erro: ' + error.message, 'error'); td.innerHTML = orig; return; }
    const m = matsData.find(x => x.id === matId);
    if (m) m[campo] = val || '';
    renderTabela();
  };
  inp.addEventListener('blur', salvar);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { td.innerHTML = orig; }
  });
};

// ── Adicionar / Remover ───────────────────────────────────────────────────────
document.getElementById('btn-add-mat').addEventListener('click', () => {
  atualizarSelectAdd();
  abrirModal('modal-add');
});

document.getElementById('btn-confirmar-add').addEventListener('click', async () => {
  const id = document.getElementById('sel-mat-add').value;
  if (!id) { toast('Selecione um material', 'error'); return; }
  const { error } = await supabase.from('materiais').update({ no_estoque: true }).eq('id', id);
  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  toast('Material adicionado ao estoque!');
  fecharModal('modal-add');
  await carregar();
});

window.removerDoEstoque = async id => {
  if (!confirm('Remover este material do estoque?')) return;
  const { error } = await supabase.from('materiais').update({ no_estoque: false }).eq('id', id);
  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  toast('Material removido do estoque!');
  await carregar();
};

document.querySelectorAll('[data-close]').forEach(btn => btn.addEventListener('click', () => fecharModal(btn.dataset.close)));
document.querySelectorAll('.modal-backdrop').forEach(m => m.addEventListener('click', e => { if(e.target===m) fecharModal(m.id); }));

await init();
</script>
</body>
</html>
