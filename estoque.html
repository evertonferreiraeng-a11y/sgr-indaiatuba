<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estoque — SGR Indaiatuba</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .edit-cell { cursor:pointer; border-bottom:1px dashed #94a3b8; }
    .edit-cell:hover { background:#f8fafc; }
    .inline-input { border:1px solid #2563eb; border-radius:4px; padding:3px 6px; font-size:14px; width:100%; box-sizing:border-box; }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-root"></div>
  <div class="main-content">
    <div class="page-header">
      <div><h2>Estoque</h2><p>Saldo atual de materiais</p></div>
    </div>
    <div class="page-body">

      <!-- KPIs -->
      <div class="kpi-grid" style="grid-template-columns:repeat(2,1fr);max-width:500px">
        <div class="kpi-card">
          <div class="kpi-label">Volume Total em Estoque</div>
          <div class="kpi-value" id="kpi-kg">—</div>
          <div class="kpi-sub">kg</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Valor Total em Estoque</div>
          <div class="kpi-value" id="kpi-valor">—</div>
          <div class="kpi-sub">R$</div>
        </div>
      </div>

      <!-- Tabela de estoque -->
      <div class="table-card">
        <div class="table-card-header">
          <h3>Saldo por Material</h3>
          <span class="text-muted" style="font-size:12px">Clique no valor unitário ou observação para editar</span>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>Material</th>
                <th class="text-right">Kg em Estoque</th>
                <th class="text-right">Valor Unitário (R$/kg)</th>
                <th class="text-right">Valor Total</th>
                <th>Observação</th>
              </tr>
            </thead>
            <tbody id="tb-estoque"></tbody>
            <tfoot id="tf-estoque"></tfoot>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="toast-container"></div>
<script type="module">
import { initPage, supabase, peso, moeda, toast } from './js/config.js';

await initPage();

let perfil, matsData = [];

async function init() {
  const { data: { user } } = await supabase.auth.getUser();
  const { data: p } = await supabase.from('profiles').select('*').eq('id', user.id).single();
  perfil = p;
  await carregar();
}

async function carregar() {
  // Busca materiais com valor_unitario e observacao
  const { data: mats, error: e1 } = await supabase.from('materiais').select('*').order('nome');
  if (e1) { console.error(e1); }

  // Busca movimentações de ENTRADA para calcular saldo
  const { data: movs, error: e2 } = await supabase
    .from('estoque_movimentacoes')
    .select('material_id, tipo, peso_kg');
  if (e2) console.error(e2);

  // Busca entradas direto da tabela entradas (peso_liquido_descontos por material)
  const { data: ents } = await supabase
    .from('entradas')
    .select('material_id, peso_liquido_descontos, peso_kg');

  // Calcula saldo por material_id a partir de movimentações
  const saldoMap = {};
  (movs || []).forEach(r => {
    if (!saldoMap[r.material_id]) saldoMap[r.material_id] = 0;
    if (r.tipo === 'entrada') saldoMap[r.material_id] += parseFloat(r.peso_kg) || 0;
    else                      saldoMap[r.material_id] -= parseFloat(r.peso_kg) || 0;
  });

  // Adiciona peso das entradas diretas (se material_id existir)
  (ents || []).forEach(r => {
    if (!r.material_id) return;
    if (!saldoMap[r.material_id]) saldoMap[r.material_id] = 0;
    saldoMap[r.material_id] += parseFloat(r.peso_liquido_descontos || r.peso_kg) || 0;
  });

  matsData = (mats || []).map(m => ({
    ...m,
    kg: Math.max(0, saldoMap[m.id] || 0),
    valor_unitario: m.valor_unitario || 0,
    observacao: m.observacao || '',
  }));

  renderTabela();
}

function renderTabela() {
  const isAdmin = perfil?.role === 'admin';
  const tb = document.getElementById('tb-estoque');

  if (!matsData.length) {
    tb.innerHTML = '<tr><td colspan="5" class="table-empty">Nenhum material cadastrado</td></tr>';
    document.getElementById('kpi-kg').textContent    = '0';
    document.getElementById('kpi-valor').textContent = 'R$ 0,00';
    return;
  }

  let totalKg = 0, totalValor = 0;

  tb.innerHTML = matsData.map(m => {
    const valorTotal = m.kg * (m.valor_unitario || 0);
    totalKg    += m.kg;
    totalValor += valorTotal;

    const valorUnitCell = isAdmin
      ? `<td class="text-right edit-cell" title="Clique para editar" onclick="editarCelula(this,'${m.id}','valor_unitario',${m.valor_unitario||0})">${formatValor(m.valor_unitario)}</td>`
      : `<td class="text-right">${formatValor(m.valor_unitario)}</td>`;

    const obsCell = isAdmin
      ? `<td class="edit-cell" title="Clique para editar" onclick="editarCelulaTexto(this,'${m.id}','observacao','${(m.observacao||'').replace(/'/g,"&#39;")}')">${m.observacao || '<span style="color:#94a3b8;font-size:12px">Clique para adicionar…</span>'}</td>`
      : `<td>${m.observacao || '—'}</td>`;

    return `<tr>
      <td><strong>${m.nome}</strong></td>
      <td class="text-right fw-600">${pesoFmt(m.kg)}</td>
      ${valorUnitCell}
      <td class="text-right fw-600${valorTotal > 0 ? ' text-green' : ''}">${moeda ? moeda(valorTotal) : 'R$ ' + valorTotal.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
      ${obsCell}
    </tr>`;
  }).join('');

  // Rodapé totais
  document.getElementById('tf-estoque').innerHTML = `
    <tr style="background:#f8fafc;font-weight:700;border-top:2px solid #e2e8f0">
      <td>TOTAL</td>
      <td class="text-right">${pesoFmt(totalKg)}</td>
      <td></td>
      <td class="text-right text-green">${fmtMoeda(totalValor)}</td>
      <td></td>
    </tr>`;

  document.getElementById('kpi-kg').textContent    = pesoFmt(totalKg);
  document.getElementById('kpi-valor').textContent = fmtMoeda(totalValor);
}

function pesoFmt(v) {
  try { return peso(v); } catch { return v.toLocaleString('pt-BR',{maximumFractionDigits:2}) + ' kg'; }
}
function fmtMoeda(v) {
  try { return moeda ? moeda(v) : 'R$ ' + v.toLocaleString('pt-BR',{minimumFractionDigits:2}); }
  catch { return 'R$ ' + v.toLocaleString('pt-BR',{minimumFractionDigits:2}); }
}
function formatValor(v) {
  if (!v) return '<span style="color:#94a3b8">0,00</span>';
  return v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}

// ── Edição inline — Valor Unitário ────────────────────────────────────────────
window.editarCelula = (td, matId, campo, valorAtual) => {
  if (td.querySelector('input')) return;
  const orig = td.innerHTML;
  td.innerHTML = `<input class="inline-input" type="number" min="0" step="0.01" value="${valorAtual}" />`;
  const inp = td.querySelector('input');
  inp.focus(); inp.select();

  const salvar = async () => {
    const novoVal = parseFloat(inp.value) || 0;
    const { error } = await supabase.from('materiais').update({ [campo]: novoVal }).eq('id', matId);
    if (error) { toast('Erro ao salvar: ' + error.message, 'error'); td.innerHTML = orig; return; }
    const m = matsData.find(x => x.id === matId);
    if (m) m[campo] = novoVal;
    renderTabela();
    toast('Valor atualizado!');
  };

  inp.addEventListener('blur', salvar);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { td.innerHTML = orig; }
  });
};

// ── Edição inline — Observação ────────────────────────────────────────────────
window.editarCelulaTexto = (td, matId, campo, valorAtual) => {
  if (td.querySelector('input')) return;
  const orig = td.innerHTML;
  td.innerHTML = `<input class="inline-input" type="text" value="${valorAtual}" placeholder="Observação…" />`;
  const inp = td.querySelector('input');
  inp.focus(); inp.select();

  const salvar = async () => {
    const novoVal = inp.value.trim() || null;
    const { error } = await supabase.from('materiais').update({ [campo]: novoVal }).eq('id', matId);
    if (error) { toast('Erro ao salvar: ' + error.message, 'error'); td.innerHTML = orig; return; }
    const m = matsData.find(x => x.id === matId);
    if (m) m[campo] = novoVal || '';
    renderTabela();
  };

  inp.addEventListener('blur', salvar);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { td.innerHTML = orig; }
  });
};

await init();
</script>
</body>
</html>
