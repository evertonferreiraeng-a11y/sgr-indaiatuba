<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório de Reunião — SGR Indaiatuba</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3/dist/pptxgen.bundle.js"></script>
  <style>
    /* ── Identidade visual do modelo de apresentação ── */
    :root {
      --primary: #006636;
      --primary-light: #5EC5BF;
      --success: #006636;
    }

    /* ── Tela ── */
    .rel-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin-bottom: 24px;
    }
    .rel-controls {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .rel-section { margin-bottom: 28px; }
    .rel-section-title {
      font-size: 12px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .1em; color: #ffffff;
      background: #006636;
      padding: 7px 14px;
      border-radius: 6px;
      margin-bottom: 16px;
      border-left: 5px solid #5EC5BF;
    }
    .rel-kpi-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px;
    }
    .rel-kpi {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
      padding: 14px 16px;
    }
    .rel-kpi-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #64748b; margin-bottom: 4px; }
    .rel-kpi-val   { font-size: 22px; font-weight: 800; color: var(--primary); }
    .rel-kpi-sub   { font-size: 11px; color: #94a3b8; margin-top: 2px; }

    .rel-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .rel-table th { background: #f1f5f9; font-weight: 700; padding: 7px 10px; text-align: left; border-bottom: 2px solid #e2e8f0; }
    .rel-table td { padding: 6px 10px; border-bottom: 1px solid #f1f5f9; }
    .rel-table tr:last-child td { border-bottom: none; }

    .balanco-bar-wrap { background:#F3F4F6; border-radius:8px; height:22px; display:flex; overflow:hidden; margin-bottom:8px; }
    .balanco-bar-seg  { height:100%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:#fff; overflow:hidden; white-space:nowrap; }
    .balanco-legenda  { display:flex; flex-wrap:wrap; gap:10px; font-size:11px; }
    .balanco-legenda span { display:flex; align-items:center; gap:4px; }
    .balanco-legenda i { width:10px; height:10px; border-radius:2px; display:inline-block; }

    .btn-pdf {
      background: #DC2626; color: #fff; border: none; border-radius: 8px;
      padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-pdf:hover { background: #b91c1c; }

    .nota-badge {
      display: inline-block; padding: 2px 10px; border-radius: 12px; font-weight: 700; font-size: 13px;
    }
    .nota-verde  { background: #d1fae5; color: #065f46; }
    .nota-amarelo{ background: #fef3c7; color: #92400e; }
    .nota-vermelho{ background: #fee2e2; color: #991b1b; }

    /* ── Impressão ── */
    @media print {
      @page { size: A4 landscape; margin: 12mm 14mm; }

      .sidebar, .sidebar-overlay, .sidebar-toggle, .mobile-menu-btn,
      .rel-controls, .btn-pdf { display: none !important; }

      body { background: #fff !important; font-size: 11px !important; }
      .main-content { margin-left: 0 !important; padding: 0 !important; }

      /* Cabeçalho da página */
      .page-header { margin-bottom: 10px !important; padding-bottom: 6px !important; border-bottom: 2px solid #006636; }
      .page-header h2 { font-size: 15px !important; margin: 0; }
      .page-header p  { font-size: 11px !important; margin: 0; }

      /* Cards e seções */
      .card { box-shadow: none !important; border: 1px solid #d1d5db !important; margin-bottom: 10px !important; padding: 10px 12px !important; }
      .rel-section { break-inside: avoid; page-break-inside: avoid; margin-bottom: 10px !important; }
      .rel-section-title { font-size: 10px !important; padding-bottom: 3px !important; margin-bottom: 8px !important; }
      .print-break { page-break-before: always; }

      /* KPI grid compacto */
      .rel-kpi-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)) !important; gap: 6px !important; margin-bottom: 8px !important; }
      .rel-kpi { padding: 8px 10px !important; border-radius: 6px !important; }
      .rel-kpi-val { font-size: 16px !important; }
      .rel-kpi-label { font-size: 9px !important; }
      .rel-kpi-sub { font-size: 9px !important; }

      /* Tabelas */
      .rel-table { font-size: 10px !important; }
      .rel-table th { padding: 5px 7px !important; font-size: 9px !important; background: #f1f5f9 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .rel-table td { padding: 4px 7px !important; }

      /* Badges de nota e status — forçar cores */
      .nota-badge, [style*="border-radius"][style*="background"] {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      .nota-verde   { background: #d1fae5 !important; color: #065f46 !important; }
      .nota-amarelo { background: #fef3c7 !important; color: #92400e !important; }
      .nota-vermelho{ background: #fee2e2 !important; color: #991b1b !important; }

      /* Barra do balanço */
      .balanco-bar-wrap, .balanco-bar-seg {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* Linha verde do mês atual na tabela */
      tr[style*="dcfce7"] {
        background: #dcfce7 !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* Linha de total */
      tr[style*="EBF5EE"] {
        background: #EBF5EE !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* Gauge canvas */
      canvas { max-width: 180px !important; max-height: 100px !important; }
    }
  </style>
</head>
<body>
<div class="main-content">
  <div class="page-header">
    <div>
      <h2>Relatório de Reunião</h2>
      <p id="rel-periodo-label">Carregando…</p>
    </div>
    <div class="rel-controls">
      <span style="font-size:13px;color:var(--text-muted)">Período:</span>
      <select id="rel-ano" style="padding:7px 10px;border-radius:6px;border:1px solid #D1D5DB;font-size:13px"></select>
      <input type="month" id="rel-mes" style="width:150px" />
      <button id="rel-btn-mes" style="padding:6px 12px;border-radius:6px;border:1px solid #D1D5DB;background:#fff;cursor:pointer;font-size:12px">Mês</button>
      <button id="rel-btn-ano" style="padding:6px 12px;border-radius:6px;border:1px solid #D1D5DB;background:#fff;cursor:pointer;font-size:12px">Ano</button>
      <button class="btn-pdf" id="btn-gerar-pdf" onclick="window.print()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Imprimir / PDF
      </button>
      <button class="btn-pdf" id="btn-gerar-pptx" style="background:#006636" onclick="gerarPPTX()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        Exportar PPTX
      </button>
    </div>
  </div>

  <div class="page-body" id="rel-body">
    <div style="text-align:center;padding:48px;color:#94a3b8">Carregando indicadores…</div>
  </div>
</div>

<script type="module">
import { supabase, initPage, mesAtual, anoAtual, moeda, ton, dataBR } from './js/config.js';

const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const CRITERIOS = ['relacionamento','responsabilidade','cooperacao','conhecimento_trabalho','interesse','atitude_profissional','produtividade'];

await initPage();

// ── Ano selector ─────────────────────────────────────────────────────────────
const selAno = document.getElementById('rel-ano');
const anoAtualVal = anoAtual();
for (let a = anoAtualVal; a >= anoAtualVal - 4; a--) {
  selAno.add(new Option(a, a));
}
selAno.value = anoAtualVal;
document.getElementById('rel-mes').value = mesAtual();

let modoAtual = 'mes'; // 'mes' | 'ano'

function getPeriodo() {
  if (modoAtual === 'ano') {
    const a = selAno.value;
    return { inicio: `${a}-01-01`, fim: `${a}-12-31`, label: `Ano ${a}` };
  }
  const mes = document.getElementById('rel-mes').value;
  const [y, m] = mes.split('-');
  return {
    inicio: `${y}-${m}-01`,
    fim: new Date(y, m, 0).toISOString().split('T')[0],
    label: `${MESES[+m-1]} de ${y}`,
  };
}

async function fetchAll(table, fields, filters = []) {
  const PAGE = 1000; let all = [], from = 0;
  while (true) {
    let q = supabase.from(table).select(fields).range(from, from + PAGE - 1);
    filters.forEach(([fn, ...args]) => { q = q[fn](...args); });
    const { data } = await q;
    if (!data || !data.length) break;
    all = all.concat(data);
    if (data.length < PAGE) break;
    from += PAGE;
  }
  return all;
}

function calcMediaAval(a) {
  const notas = CRITERIOS.map(c => parseFloat(a[c]) || 0).filter(v => v > 0);
  return notas.length ? notas.reduce((s, v) => s + v, 0) / notas.length : null;
}

function notaClass(n) {
  if (n === null) return '';
  return n >= 7 ? 'nota-verde' : n >= 5 ? 'nota-amarelo' : 'nota-vermelho';
}

async function carregar() {
  const { inicio, fim, label } = getPeriodo();
  document.getElementById('rel-periodo-label').textContent = label;
  document.getElementById('rel-body').innerHTML = '<div style="text-align:center;padding:48px;color:#94a3b8">Carregando…</div>';

  const ano = inicio.slice(0, 4);

  const [ents, vends, mats, equipamentos, colaboradores, avaliacoes, ocorrencias, producoes, metas, vendsAno, cargosAll] = await Promise.all([
    fetchAll('entradas', 'peso_liquido, peso_liquido_descontos, tipo_movimentacao, data', [['gte','data',inicio],['lte','data',fim]]),
    fetchAll('vendas', 'peso_kg, valor_total, data, clientes(nome)', [['gte','data',inicio],['lte','data',fim]]),
    fetchAll('materiais', 'nome, estoque_kg, valor_unitario, no_estoque', [['eq','no_estoque',true]]),
    fetchAll('equipamentos', 'nome, frota, status, capacidade_pct, descricao, funcao', []),
    fetchAll('colaboradores', '*, cargos(nome, vagas)', []),
    fetchAll('colaborador_avaliacoes', '*', []),
    fetchAll('ocorrencias', 'tipo, data, colaborador_id', [['gte','data',inicio],['lte','data',fim]]),
    fetchAll('producao', 'peso_kg, data', [['gte','data',inicio],['lte','data',fim]]),
    fetchAll('metas', 'periodo, valor_meta', [['eq','indicador','faturamento'],['gte','periodo',`${ano}-01`],['lte','periodo',`${ano}-12`]]),
    fetchAll('vendas', 'peso_kg, valor_total, data', [['gte','data',`${ano}-01-01`],['lte','data',`${ano}-12-31`]]),
    fetchAll('cargos', 'nome, vagas', []),
  ]);

  // ── Balanço ──────────────────────────────────────────────────────────────
  const recebido = ents.filter(r=>r.tipo_movimentacao!=='saida').reduce((s,r)=>s+parseFloat(r.peso_liquido_descontos||r.peso_liquido||0),0);
  const rejeito  = ents.filter(r=>r.tipo_movimentacao==='saida').reduce((s,r)=>s+parseFloat(r.peso_liquido||r.peso_liquido_descontos||0),0);
  const expedido = vends.reduce((s,r)=>s+(r.peso_kg||0),0);
  const estoque  = mats.reduce((s,r)=>s+parseFloat(r.estoque_kg||0),0);
  const passivo  = Math.max(0, recebido - expedido - rejeito - estoque);
  const taxa     = recebido > 0 ? Math.min(((expedido + estoque) / recebido) * 100, 100) : 0;

  const pct = v => recebido > 0 ? ((v / recebido) * 100).toFixed(1) : '0.0';
  const segs = [
    { label:'Expedido', val:expedido, cor:'#006636' },
    { label:'Rejeito',  val:rejeito,  cor:'#DC2626' },
    { label:'Estoque',  val:estoque,  cor:'#3B82F6' },
    { label:'Passivo',  val:passivo,  cor:'#F59E0B' },
  ];

  // ── Faturamento ──────────────────────────────────────────────────────────
  const faturamento   = vends.reduce((s,r)=>s+(r.valor_total||0),0);
  const ticketMedio   = expedido > 0 ? faturamento / (expedido / 1000) : 0;
  const valorEstoque  = mats.reduce((s,r)=>s+(parseFloat(r.estoque_kg||0)*parseFloat(r.valor_unitario||0)),0);
  const totalPotencial = faturamento + valorEstoque;

  // ── Tabela mensal faturamento (ano inteiro) ──────────────────────────────
  const fatReal  = Array(12).fill(0);
  const fatPrev  = Array(12).fill(0);
  const fatKg    = Array(12).fill(0);
  const mesAtualIdx = new Date().getMonth();
  (vendsAno||[]).forEach(r => {
    const i = new Date(r.data+'T00:00:00').getMonth();
    fatReal[i] += r.valor_total||0;
    fatKg[i]   += r.peso_kg||0;
  });
  (metas||[]).forEach(m => {
    const i = parseInt(m.periodo.split('-')[1])-1;
    if (i>=0 && i<12) fatPrev[i] = m.valor_meta||0;
  });

  // ── Produção ────────────────────────────────────────────────────────────
  const prodTotal = producoes.reduce((s,r)=>s+(r.peso_kg||0),0);

  // ── Equipamentos ────────────────────────────────────────────────────────
  const equTotal    = equipamentos.length;
  const equOperando = equipamentos.filter(e=>e.status==='operando').length;
  const equRestricao= equipamentos.filter(e=>e.status==='restricao').length;
  const equAtivos   = equOperando + equRestricao;
  const equPct      = equTotal ? Math.round((equAtivos/equTotal)*100) : 0;

  // ── RH ──────────────────────────────────────────────────────────────────
  const hoje = new Date().toISOString().split('T')[0];
  const ativos = colaboradores.filter(c => !c.demissao);
  const emExp  = ativos.filter(c =>
    (c.fim_experiencia_1 && hoje <= c.fim_experiencia_1) ||
    (c.fim_experiencia_2 && hoje <= c.fim_experiencia_2)
  );
  const faltas    = ocorrencias.filter(o=>o.tipo==='falta').length;
  const atestados = ocorrencias.filter(o=>o.tipo==='atestado').length;
  const demAno    = colaboradores.filter(c=>c.demissao && c.demissao.startsWith(ano)).length;
  const hc        = ativos.length + demAno;
  const turnover  = hc ? ((demAno/hc)*100).toFixed(1) : '0.0';

  // Mesma fórmula do módulo RH: média de todas as avaliações do colaborador
  const notasAtivos = ativos.map(c => {
    const avals  = avaliacoes.filter(a=>a.colaborador_id===c.id);
    const medias = avals.map(calcMediaAval).filter(v=>v!==null);
    return medias.length ? medias.reduce((a,b)=>a+b,0)/medias.length : null;
  }).filter(v=>v!==null);
  const notaMedia = notasAtivos.length ? (notasAtivos.reduce((a,b)=>a+b,0)/notasAtivos.length) : null;

  const colobsComNota = ativos.map(c => {
    const avals  = avaliacoes.filter(a=>a.colaborador_id===c.id);
    const medias = avals.map(calcMediaAval).filter(v=>v!==null);
    const nota   = medias.length ? medias.reduce((a,b)=>a+b,0)/medias.length : null;
    const hoje = new Date().toISOString().slice(0,10);
    const exp1 = c.fim_experiencia_1 && hoje <= c.fim_experiencia_1 ? c.fim_experiencia_1 : null;
    const exp2 = c.fim_experiencia_2 && hoje <= c.fim_experiencia_2 ? c.fim_experiencia_2 : null;
    const fimExp = exp2 || exp1;
    return { nome: c.nome, cargo: c.cargos?.nome || '—', fimExp, nota };
  }).sort((a,b)=>(b.nota??-1)-(a.nota??-1));

  // ── Materiais em estoque ─────────────────────────────────────────────────
  const matsEstoque = mats.filter(m=>parseFloat(m.estoque_kg||0)>0).sort((a,b)=>b.estoque_kg-a.estoque_kg);

  // ── Expõe dados globalmente para gerarPPTX() ─────────────────────────────
  window.relData = {
    label, inicio, fim, ano,
    recebido, expedido, rejeito, estoque, passivo, taxa,
    faturamento, ticketMedio, valorEstoque, totalPotencial,
    fatReal: [...fatReal], fatPrev: [...fatPrev], fatKg: [...fatKg], mesAtualIdx,
    equTotal, equAtivos, equOperando, equRestricao, equPct,
    equipamentos: equipamentos.map(e=>({ nome:e.nome, frota:e.frota, funcao:e.funcao, status:e.status })),
    matsEstoque: matsEstoque.map(m=>({ nome:m.nome, estoque_kg:m.estoque_kg })),
    colobsComNota: colobsComNota.map(c=>({ nome:c.nome, cargo:c.cargo, nota:c.nota, fimExp:c.fimExp })),
    notaMedia, turnover,
    ativos: ativos.length, emExp: emExp.length,
    vagasMap: Object.fromEntries(
      Object.entries((() => {
        const vm = {};
        (cargosAll||[]).forEach(c=>{ vm[c.nome]={ preenchido:0, total:c.vagas??null }; });
        ativos.forEach(c=>{ const n=c.cargos?.nome||'Sem cargo'; if(!vm[n]) vm[n]={preenchido:0,total:null}; vm[n].preenchido++; });
        return vm;
      })()).filter(([k])=>k&&k!=='undefined'&&k!=='Sem cargo')
    ),
  };

  // ── Render ───────────────────────────────────────────────────────────────
  document.getElementById('rel-body').innerHTML = `

    <!-- Capa -->
    <div class="rel-section" style="background:#006636;border-radius:12px;padding:32px 36px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px">
      <div>
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#5EC5BF;letter-spacing:.1em;margin-bottom:6px">SGR Indaiatuba — UVRR Indaiatuba</div>
        <div style="font-size:30px;font-weight:900;color:#ffffff;margin:4px 0;letter-spacing:-.5px">Comitê de Gestão</div>
        <div style="font-size:16px;color:#5EC5BF;font-weight:600;margin-top:4px">${label}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:12px;color:#5EC5BF;margin-bottom:4px">Gerado em ${new Date().toLocaleDateString('pt-BR')}</div>
        <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end;margin-top:8px">
          <div style="width:36px;height:4px;background:#5EC5BF;border-radius:2px"></div>
          <div style="width:24px;height:4px;background:rgba(255,255,255,0.3);border-radius:2px"></div>
          <div style="width:12px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px"></div>
        </div>
      </div>
    </div>

    <!-- 1. Balanço de Massa -->
    <div class="card rel-section">
      <div class="rel-section-title">Balanço de Massa</div>
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:12px">
        <!-- Coluna esquerda: cards + barra + legenda -->
        <div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">
            <div class="rel-kpi" style="flex:1;min-width:100px">
              <div class="rel-kpi-label">⬇ Recebido</div>
              <div class="rel-kpi-val">${ton(recebido)}</div>
              <div class="rel-kpi-sub">base do balanço</div>
            </div>
            <div class="rel-kpi" style="flex:1;min-width:100px">
              <div class="rel-kpi-label" style="color:#006636">Expedido</div>
              <div class="rel-kpi-val" style="color:#006636">${ton(expedido)}</div>
              <div class="rel-kpi-sub" style="color:#006636">${pct(expedido)}% do recebido</div>
            </div>
            <div class="rel-kpi" style="flex:1;min-width:100px">
              <div class="rel-kpi-label" style="color:#DC2626">Rejeito</div>
              <div class="rel-kpi-val" style="color:#DC2626">${ton(rejeito)}</div>
              <div class="rel-kpi-sub" style="color:#DC2626">${pct(rejeito)}% do recebido</div>
            </div>
            <div class="rel-kpi" style="flex:1;min-width:100px">
              <div class="rel-kpi-label" style="color:#3B82F6">Estoque</div>
              <div class="rel-kpi-val" style="color:#3B82F6">${ton(estoque)}</div>
              <div class="rel-kpi-sub" style="color:#3B82F6">${pct(estoque)}% do recebido</div>
            </div>
            <div class="rel-kpi" style="flex:1;min-width:100px">
              <div class="rel-kpi-label" style="color:#F59E0B">Passivo</div>
              <div class="rel-kpi-val" style="color:#F59E0B">${ton(passivo)}</div>
              <div class="rel-kpi-sub" style="color:#F59E0B">${pct(passivo)}% do recebido</div>
            </div>
          </div>
          <div class="balanco-bar-wrap" style="margin-bottom:8px">
            ${segs.map(s=>`<div class="balanco-bar-seg" style="width:${pct(s.val)}%;background:${s.cor}" title="${s.label}: ${pct(s.val)}%">${parseFloat(pct(s.val))>5?pct(s.val)+'%':''}</div>`).join('')}
          </div>
          <div class="balanco-legenda" style="margin-bottom:10px">
            ${[...segs,{label:'Estoque',val:estoque,cor:'#3B82F6'}].map(s=>`<span><i style="background:${s.cor}"></i>${s.label} ${pct(s.val)}%</span>`).join('')}
          </div>
          <div style="background:#D1FAE5;border:1px solid #6EE7B7;border-radius:8px;padding:8px 12px;font-size:12px;color:#065f46">

        return `

                ? `<span style="color:#006636;font-weight:600">✅ Completo</span>`

  `;

  // ── Gauge (velocímetro) ───────────────────────────────────────────────────
  const canvas = document.getElementById('gauge-rel');
  if (canvas) {
    const ctx = canvas.getContext('2d');
    const cx = 110, cy = 100, r = 80;
    const startAngle = Math.PI;
    const endAngle   = 2 * Math.PI;
    const cor = taxa >= 70 ? '#006636' : taxa >= 40 ? '#D97706' : '#DC2626';
    const valorAngle = startAngle + (taxa / 100) * Math.PI;

    ctx.clearRect(0, 0, 220, 120);

    // fundo cinza
    ctx.beginPath();
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.lineWidth = 18;
    ctx.strokeStyle = '#E5E7EB';
    ctx.lineCap = 'round';
    ctx.stroke();

    // arco colorido
    if (taxa > 0) {
      ctx.beginPath();
      ctx.arc(cx, cy, r, startAngle, valorAngle);
      ctx.lineWidth = 18;
      ctx.strokeStyle = cor;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    // agulha
    const agulhaAngle = valorAngle;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + (r - 22) * Math.cos(agulhaAngle), cy + (r - 22) * Math.sin(agulhaAngle));
    ctx.lineWidth = 3;
    ctx.strokeStyle = cor;
    ctx.lineCap = 'round';
    ctx.stroke();

    // centro
    ctx.beginPath();
    ctx.arc(cx, cy, 6, 0, 2 * Math.PI);
    ctx.fillStyle = cor;
    ctx.fill();

    const valEl = document.getElementById('gauge-rel-val');
    if (valEl) { valEl.textContent = taxa.toFixed(1) + '%'; valEl.style.color = cor; }
  }
}

function setModo(modo) {
  modoAtual = modo;
  const ativo = 'background:var(--primary);color:#fff;border-color:var(--primary)';
  const inativo = 'background:#fff;color:#374151;border:1px solid #D1D5DB';
  document.getElementById('rel-btn-mes').style.cssText = (modo==='mes'?ativo:inativo) + ';padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px';
  document.getElementById('rel-btn-ano').style.cssText = (modo==='ano'?ativo:inativo) + ';padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px';
  carregar();
}

document.getElementById('rel-btn-mes').addEventListener('click', () => setModo('mes'));
document.getElementById('rel-btn-ano').addEventListener('click', () => setModo('ano'));
document.getElementById('rel-mes').addEventListener('change', () => { modoAtual='mes'; carregar(); });
document.getElementById('rel-ano').addEventListener('change', () => carregar());

setModo('mes');
</script>

    kpiBox(s6, 0.2,  0.8, 1.8, 1.0, 'ATIVOS',        String(d.ativos),  null, VERDE);
    kpiBox(s6, 2.2,  0.8, 1.8, 1.0, 'EM EXPERIÊNCIA', String(d.emExp),  null, AMARELO);
    kpiBox(s6, 4.2,  0.8, 1.8, 1.0, 'NOTA MÉDIA',    d.notaMedia?d.notaMedia.toFixed(1):'—', null, '0F766E');
    kpiBox(s6, 6.2,  0.8, 1.8, 1.0, 'TURNOVER (ANO)', d.turnover+'%',  null, parseFloat(d.turnover)>10?VERMELHO:VERDE);

    // Balanço de vagas
    const vagasEntries = Object.entries(d.vagasMap||{}).filter(([k])=>k&&k!=='undefined');
    if (vagasEntries.length) {
      const vRows = [['Cargo','Preenchido','Total Vagas','Situação']];
      vagasEntries.sort((a,b)=>a[0].localeCompare(b[0])).forEach(([cargo, info]) => {
        const sit = info.total===null?'—':info.preenchido>=info.total?'✅ Completo':`⚠️ ${info.total-info.preenchido} vaga(s) em aberto`;
        vRows.push([cargo, String(info.preenchido), info.total!==null?String(info.total):'—', sit]);
      });
      s6.addText('BALANÇO DE VAGAS', { x:0.2, y:1.92, w:4, h:0.22, fontSize:8, bold:true, color:CINZA, fontFace:'Calibri' });
      s6.addTable(vRows, {
        x:0.2, y:2.15, w:5.8, h:1.4,
        fontSize:8, fontFace:'Calibri', color:TEXTO, colW:[2.5,1.0,1.1,1.2],
        border:{ type:'solid', color:'E2E8F0', pt:0.5 }, fill:{ color:BRANCO }, align:'center',
        thead:{ fill:{ color:VERDE }, color:BRANCO, bold:true }, rowH:0.28,
      });
    }

    // Avaliação por colaborador
    const aRows = [['Colaborador','Cargo','Nota','Classificação','Fim Exp.']];
    d.colobsComNota.forEach(c => {
      const cls = c.nota===null?'Sem avaliação':c.nota>=7?'✅ Recomendado':c.nota>=5?'⚠️ Em observação':'❌ Avaliar desligamento';
      aRows.push([c.nome, c.cargo, c.nota!==null?c.nota.toFixed(1):'—', cls, c.fimExp||'—']);
    });
    s6.addText('AVALIAÇÃO POR COLABORADOR', { x:0.2, y:3.62, w:9, h:0.22, fontSize:8, bold:true, color:CINZA, fontFace:'Calibri' });
    s6.addTable(aRows, {
      x:0.2, y:3.85, w:9.6, h:1.6,
      fontSize:8, fontFace:'Calibri', color:TEXTO, colW:[2.5,2.5,0.7,2.2,1.7],
      border:{ type:'solid', color:'E2E8F0', pt:0.5 }, fill:{ color:BRANCO }, align:'center',
      thead:{ fill:{ color:VERDE }, color:BRANCO, bold:true }, rowH:0.28, autoPage:false,
    });

    // ── Slide 7: Encerramento ────────────────────────────────────────────────
    const s7 = pptx.addSlide();
    s7.background = { color: VERDE };
    s7.addImage({ data: bgCapa, x:4.5, y:-0.3, w:5.8, h:6.2 });
    s7.addImage({ data: logo, x:0.3, y:0.3, w:0.9, h:1.8 });
    s7.addText('Obrigado!', { x:1.5, y:1.8, w:8, h:1.2, fontSize:40, bold:true, color:BRANCO, align:'left', fontFace:'Calibri' });
    s7.addText('UVR Indaiatuba — SGR Indaiatuba', { x:1.5, y:3.1, w:8, h:0.5, fontSize:14, color:TEAL, align:'left', fontFace:'Calibri' });
    s7.addText(d.label, { x:1.5, y:3.7, w:8, h:0.35, fontSize:11, color:BRANCO, align:'left', fontFace:'Calibri' });

    const data = new Date().toLocaleDateString('pt-BR').replace(/\//g,'-');
    await pptx.writeFile({ fileName: `Comite_UVR_Indaiatuba_${data}.pptx` });
  } catch(e) {
    alert('Erro ao gerar PPTX: '+e.message);
    console.error(e);
  } finally {
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg> Exportar PPTX';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
