<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RH — SGR Indaiatuba</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-layout">
  <div id="sidebar-root"></div>
  <div class="main-content">
    <div class="page-header">
      <div><h2>Recursos Humanos</h2><p>Colaboradores e ocorrências</p></div>
      <button class="btn btn-primary" id="btn-nova-ocorrencia">+ Registrar Ocorrência</button>
    </div>
    <div class="page-body">
      <!-- KPIs do mês -->
      <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
        <div class="kpi-card"><div class="kpi-label">Faltas</div><div class="kpi-value text-red" id="kpi-faltas">—</div><div class="kpi-sub">no mês</div></div>
        <div class="kpi-card"><div class="kpi-label">Atrasos</div><div class="kpi-value text-red" id="kpi-atrasos">—</div><div class="kpi-sub">no mês</div></div>
        <div class="kpi-card"><div class="kpi-label">Advertências</div><div class="kpi-value" id="kpi-adv" style="color:var(--warning)">—</div><div class="kpi-sub">no mês</div></div>
        <div class="kpi-card"><div class="kpi-label">Atestados</div><div class="kpi-value" id="kpi-atest">—</div><div class="kpi-sub">no mês</div></div>
      </div>

      <!-- Filtro mês KPIs -->
      <div class="card mb-16" style="padding:14px 16px">
        <div class="filters-row">
          <div class="form-group"><label>Mês de referência</label><input type="month" id="f-mes-kpi" /></div>
          <div class="form-group" style="justify-content:flex-end"><label>&nbsp;</label><button class="btn btn-primary" id="btn-filtrar-kpi">Atualizar KPIs</button></div>
        </div>
      </div>

      <!-- Colaboradores -->
      <div class="table-card">
        <div class="table-card-header">
          <h3>Colaboradores</h3>
          <button class="btn btn-sm btn-primary" id="btn-novo-colab">+ Adicionar</button>
        </div>
        <div class="table-scroll">
          <table>
            <thead><tr><th>Nome</th><th>Cargo</th><th>Admissão</th><th>Status</th><th>Ações</th></tr></thead>
            <tbody id="tb-colaboradores"></tbody>
          </table>
        </div>
      </div>

      <!-- Ocorrências -->
      <div class="card mb-16" style="padding:16px">
        <div class="filters-row">
          <div class="form-group"><label>Mês</label><input type="month" id="f-mes-oc" /></div>
          <div class="form-group"><label>Colaborador</label><select id="f-colab"><option value="">Todos</option></select></div>
          <div class="form-group"><label>Tipo</label>
            <select id="f-tipo-oc">
              <option value="">Todos</option>
              <option value="falta">Falta</option>
              <option value="atraso">Atraso</option>
              <option value="advertencia">Advertência</option>
              <option value="atestado">Atestado</option>
            </select>
          </div>
          <div class="form-group" style="justify-content:flex-end"><label>&nbsp;</label><button class="btn btn-primary" id="btn-filtrar-oc">Filtrar</button></div>
        </div>
      </div>

      <div class="table-card">
        <div class="table-card-header">
          <h3>Ocorrências</h3>
          <span id="oc-count" class="text-muted" style="font-size:12px"></span>
        </div>
        <div class="table-scroll">
          <table>
            <thead><tr><th>Data</th><th>Colaborador</th><th>Tipo</th><th>Observação</th><th>Ações</th></tr></thead>
            <tbody id="tb-ocorrencias"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Novo Colaborador -->
<div class="modal-backdrop" id="modal-colab">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-colab-title">Novo Colaborador</h3>
      <button class="modal-close" data-close="modal-colab">✕</button>
    </div>
    <div class="modal-body">
      <form id="form-colab">
        <input type="hidden" name="id" />
        <div class="form-grid">
          <div class="form-group full"><label>Nome *</label><input type="text" name="nome" required /></div>
          <div class="form-group"><label>Cargo</label><input type="text" name="cargo" /></div>
          <div class="form-group"><label>Data de Admissão</label><input type="date" name="data_admissao" /></div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" data-close="modal-colab">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar-colab">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal: Ocorrência -->
<div class="modal-backdrop" id="modal-ocorrencia">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-oc-title">Registrar Ocorrência</h3>
      <button class="modal-close" data-close="modal-ocorrencia">✕</button>
    </div>
    <div class="modal-body">
      <form id="form-ocorrencia">
        <input type="hidden" name="id" />
        <div class="form-grid">
          <div class="form-group"><label>Data *</label><input type="date" name="data" required /></div>
          <div class="form-group"><label>Colaborador *</label><select name="colaborador_id" required><option value="">Selecione…</option></select></div>
          <div class="form-group full"><label>Tipo *</label>
            <select name="tipo" required>
              <option value="">Selecione…</option>
              <option value="falta">Falta</option>
              <option value="atraso">Atraso</option>
              <option value="advertencia">Advertência</option>
              <option value="atestado">Atestado</option>
            </select>
          </div>
          <div class="form-group full"><label>Observação</label><textarea name="observacao" rows="3"></textarea></div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" data-close="modal-ocorrencia">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar-oc">Salvar</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script type="module">
import { initPage, supabase, dataBR, toast, abrirModal, fecharModal, mesAtual } from './js/config.js';

await initPage();

let perfil, colaboradores = [], ocorrenciasData = [];

const tipoLabel = { falta:'Falta', atraso:'Atraso', advertencia:'Advertência', atestado:'Atestado' };
const tipoBadge = { falta:'badge-red', atraso:'badge-red', advertencia:'badge-yellow', atestado:'badge-gray' };

async function init() {
  const { data: { user } } = await supabase.auth.getUser();
  const { data: p } = await supabase.from('profiles').select('*').eq('id', user.id).single();
  perfil = p;

  const { data: col } = await supabase.from('colaboradores').select('*').eq('ativo',true).order('nome');
  colaboradores = col || [];
  popularSelects();

  document.getElementById('f-mes-kpi').value = mesAtual();
  document.getElementById('f-mes-oc').value  = mesAtual();

  await Promise.all([carregarKPIs(), carregarColaboradores(), carregarOcorrencias()]);
}

function popularSelects() {
  const opts = colaboradores.map(c=>`<option value="${c.id}">${c.nome}</option>`).join('');
  document.getElementById('f-colab').innerHTML = '<option value="">Todos</option>' + opts;
  document.querySelector('#form-ocorrencia [name="colaborador_id"]').innerHTML = '<option value="">Selecione…</option>' + opts;
}

async function carregarKPIs() {
  const mes = document.getElementById('f-mes-kpi').value;
  if (!mes) return;
  const [y,m] = mes.split('-');
  const inicio = `${y}-${m}-01`;
  const fim    = new Date(y,m,0).toISOString().split('T')[0];

  const { data } = await supabase.from('rh_ocorrencias')
    .select('tipo').gte('data', inicio).lte('data', fim);

  const cnt = { falta:0, atraso:0, advertencia:0, atestado:0 };
  (data||[]).forEach(r => { if(cnt[r.tipo]!==undefined) cnt[r.tipo]++; });

  document.getElementById('kpi-faltas').textContent  = cnt.falta;
  document.getElementById('kpi-atrasos').textContent = cnt.atraso;
  document.getElementById('kpi-adv').textContent     = cnt.advertencia;
  document.getElementById('kpi-atest').textContent   = cnt.atestado;
}

async function carregarColaboradores() {
  const { data } = await supabase.from('colaboradores').select('*').order('nome');
  const isAdmin = perfil?.role === 'admin';
  document.getElementById('tb-colaboradores').innerHTML = (data||[]).map(c=>`
    <tr>
      <td>${c.nome}</td>
      <td>${c.cargo||'—'}</td>
      <td>${c.data_admissao ? dataBR(c.data_admissao) : '—'}</td>
      <td><span class="badge ${c.ativo?'badge-green':'badge-gray'}">${c.ativo?'Ativo':'Inativo'}</span></td>
      <td>${isAdmin?`
        <button class="btn-icon" onclick="editarColab(${JSON.stringify(c).replace(/"/g,'&quot;')})">✏️</button>
        <button class="btn-icon danger" onclick="toggleColab('${c.id}',${c.ativo})">${c.ativo?'🚫':'✅'}</button>
        <button class="btn-icon" onclick="novaOcorrenciaPara('${c.id}')" title="Registrar ocorrência">📋</button>
      `:'—'}</td>
    </tr>
  `).join('') || '<tr><td colspan="5" class="table-empty">Nenhum colaborador</td></tr>';
}

async function carregarOcorrencias() {
  let q = supabase.from('rh_ocorrencias')
    .select('*, colaboradores(nome)')
    .order('data', { ascending: false });

  const mes   = document.getElementById('f-mes-oc').value;
  const colab = document.getElementById('f-colab').value;
  const tipo  = document.getElementById('f-tipo-oc').value;

  if (mes) {
    const [y,m] = mes.split('-');
    q = q.gte('data',`${y}-${m}-01`).lte('data', new Date(y,m,0).toISOString().split('T')[0]);
  }
  if (colab) q = q.eq('colaborador_id', colab);
  if (tipo)  q = q.eq('tipo', tipo);

  const { data } = await q;
  ocorrenciasData = data || [];
  document.getElementById('oc-count').textContent = `${ocorrenciasData.length} registros`;

  const isAdmin = perfil?.role === 'admin';
  const tb = document.getElementById('tb-ocorrencias');
  if (!ocorrenciasData.length) {
    tb.innerHTML = '<tr><td colspan="5" class="table-empty">Nenhuma ocorrência encontrada</td></tr>';
    return;
  }
  tb.innerHTML = ocorrenciasData.map(r=>`
    <tr>
      <td>${dataBR(r.data)}</td>
      <td>${r.colaboradores?.nome||'—'}</td>
      <td><span class="badge ${tipoBadge[r.tipo]||'badge-gray'}">${tipoLabel[r.tipo]||r.tipo}</span></td>
      <td>${r.observacao||'—'}</td>
      <td>${isAdmin?`
        <button class="btn-icon" onclick="editarOc('${r.id}')">✏️</button>
        <button class="btn-icon danger" onclick="excluirOc('${r.id}')">🗑️</button>
      `:'—'}</td>
    </tr>
  `).join('');
}

/* ── Colaborador CRUD ── */
document.getElementById('btn-novo-colab').addEventListener('click', () => {
  document.getElementById('modal-colab-title').textContent = 'Novo Colaborador';
  document.getElementById('form-colab').reset();
  document.querySelector('#form-colab [name="id"]').value = '';
  abrirModal('modal-colab');
});
window.editarColab = c => {
  document.getElementById('modal-colab-title').textContent = 'Editar Colaborador';
  const f = document.getElementById('form-colab');
  f.querySelector('[name="id"]').value           = c.id;
  f.querySelector('[name="nome"]').value         = c.nome;
  f.querySelector('[name="cargo"]').value        = c.cargo||'';
  f.querySelector('[name="data_admissao"]').value = c.data_admissao||'';
  abrirModal('modal-colab');
};
window.toggleColab = async (id, ativo) => {
  await supabase.from('colaboradores').update({ ativo: !ativo }).eq('id', id);
  carregarColaboradores();
};
document.getElementById('btn-salvar-colab').addEventListener('click', async () => {
  const f = document.getElementById('form-colab');
  if (!f.checkValidity()) { f.reportValidity(); return; }
  const fd = Object.fromEntries(new FormData(f));
  const payload = { nome: fd.nome, cargo: fd.cargo, data_admissao: fd.data_admissao || null };
  if (fd.id) { await supabase.from('colaboradores').update(payload).eq('id', fd.id); toast('Colaborador atualizado!'); }
  else       { await supabase.from('colaboradores').insert(payload); toast('Colaborador criado!'); }
  fecharModal('modal-colab');
  const { data: col } = await supabase.from('colaboradores').select('*').eq('ativo',true).order('nome');
  colaboradores = col||[];
  popularSelects();
  carregarColaboradores();
});

/* ── Ocorrência CRUD ── */
document.getElementById('btn-nova-ocorrencia').addEventListener('click', () => {
  document.getElementById('modal-oc-title').textContent = 'Registrar Ocorrência';
  document.getElementById('form-ocorrencia').reset();
  document.querySelector('#form-ocorrencia [name="id"]').value = '';
  abrirModal('modal-ocorrencia');
});

window.novaOcorrenciaPara = colabId => {
  document.getElementById('form-ocorrencia').reset();
  document.querySelector('#form-ocorrencia [name="id"]').value             = '';
  document.querySelector('#form-ocorrencia [name="colaborador_id"]').value = colabId;
  abrirModal('modal-ocorrencia');
};

window.editarOc = id => {
  const r = ocorrenciasData.find(o=>o.id===id);
  if (!r) return;
  const f = document.getElementById('form-ocorrencia');
  f.querySelector('[name="id"]').value             = r.id;
  f.querySelector('[name="data"]').value           = r.data;
  f.querySelector('[name="colaborador_id"]').value = r.colaborador_id;
  f.querySelector('[name="tipo"]').value           = r.tipo;
  f.querySelector('[name="observacao"]').value     = r.observacao||'';
  abrirModal('modal-ocorrencia');
};

document.getElementById('btn-salvar-oc').addEventListener('click', async () => {
  const f = document.getElementById('form-ocorrencia');
  if (!f.checkValidity()) { f.reportValidity(); return; }
  const fd = Object.fromEntries(new FormData(f));
  const payload = {
    colaborador_id: fd.colaborador_id,
    tipo:           fd.tipo,
    data:           fd.data,
    observacao:     fd.observacao || null
  };
  if (fd.id) { await supabase.from('rh_ocorrencias').update(payload).eq('id', fd.id); toast('Ocorrência atualizada!'); }
  else       { await supabase.from('rh_ocorrencias').insert(payload); toast('Ocorrência registrada!'); }
  fecharModal('modal-ocorrencia');
  carregarOcorrencias();
  carregarKPIs();
});

window.excluirOc = async id => {
  if (!confirm('Excluir esta ocorrência?')) return;
  await supabase.from('rh_ocorrencias').delete().eq('id', id);
  toast('Ocorrência excluída!');
  carregarOcorrencias();
  carregarKPIs();
};

document.getElementById('btn-filtrar-kpi').addEventListener('click', carregarKPIs);
document.getElementById('btn-filtrar-oc').addEventListener('click', carregarOcorrencias);
document.querySelectorAll('[data-close]').forEach(btn => btn.addEventListener('click', () => fecharModal(btn.dataset.close)));
document.querySelectorAll('.modal-backdrop').forEach(m => m.addEventListener('click', e => { if(e.target===m) fecharModal(m.id); }));

await init();
</script>
</body>
</html>
